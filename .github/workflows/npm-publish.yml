name: Release packages

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Version or publish with Changesets
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Work
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            Work/package-lock.json
            sub-modules/Typography/package-lock.json
            sub-modules/innerComponents/package-lock.json
            sub-modules/Miscellaneous/package-lock.json
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Check for .changeset directory
        id: check_changeset
        run: |
          if [ -d "${{ github.workspace }}/.changeset" ]; then
            echo "has_changeset=true" >> $GITHUB_OUTPUT
          else
            echo "has_changeset=false" >> $GITHUB_OUTPUT
            echo "Skipping release step: .changeset directory not found"
          fi

      - name: Create release PR or publish
        if: steps.check_changeset.outputs.has_changeset == 'true'
        uses: changesets/action@v1
        with:
          cwd: Work
          version: npm run version-packages
          publish: npm run release
          title: "chore(release): version packages"
          commit: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.npm_token }}
